services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Loopback-only: backend reaches db over the compose network; not exposed to the LAN.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  storage-sidecar:
    build: ./storage-sidecar
    env_file: .env
    # No host port publish — only the backend reaches it via the compose network
    # (http://storage-sidecar:3001). Requires x-sidecar-token on every request.
    expose:
      - "3001"
    restart: unless-stopped

  memory-sidecar:
    build: ./memory-sidecar
    env_file: .env   # needs OG_COMPUTE_* (extraction) + SIDECAR_AUTH_TOKEN (auth)
    environment:
      UVICORN_HOST: "0.0.0.0"
      # File-based graph/vector/relational stores live here (persist across restarts).
      COGNEE_SYSTEM_ROOT: /app/.cognee_system
      COGNEE_DATA_ROOT: /app/.data_storage
    volumes:
      - cognee_data:/app/.cognee_system
      - cognee_files:/app/.data_storage
    # No host port publish — only the backend reaches it via the compose network.
    expose:
      - "3002"
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: .env
    environment:
      UVICORN_HOST: "0.0.0.0"   # local: bind IPv4 so host curl works (Railway uses :: default)
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      storage-sidecar:
        condition: service_started
      memory-sidecar:
        condition: service_started
    restart: unless-stopped

  frontend:
    build: ./frontend
    # Minimal env — the frontend must NOT receive backend secrets (keys, db, paycrest).
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Ola}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  cognee_data:    # Cognee graph + vector + relational stores (.cognee_system)
  cognee_files:   # Cognee ingested source files (.data_storage)
